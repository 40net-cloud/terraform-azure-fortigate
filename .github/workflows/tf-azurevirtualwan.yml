name: '[FGT] TF - AzureVirtualWAN'

on:
  push:
    branches:
      - main
    paths:
      - 'examples/azurevirtualwan/**'
      - 'modules/azurevirtualwan/**'
      - '.github/workflows/terraform-test.yml'
      - '.github/workflows/tf-azurevirtualwan.yml'
  pull_request:
    paths:
      - 'examples/azurevirtualwan/**'
      - 'modules/azurevirtualwan/**'
      - '.github/workflows/terraform-test.yml'
      - '.github/workflows/tf-azurevirtualwan.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy the VWAN hub + FortiGate managed NVA (apply + destroy). Slow: 1-2 hours. Off = plan only.'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel: a killed deploy run would skip its destroy/cleanup

jobs:
  test:
    permissions:
      id-token: write # required for Azure OIDC federated login
      contents: read
    uses: ./.github/workflows/terraform-test.yml
    with:
      example: azurevirtualwan
      prefix: fortiqa-vwan # lowercase: prefix may be used in DNS labels
      # managedidentity_id = "": the module creates + authorizes a managed identity itself
      # managed RG must NOT pre-exist -> unique name per run
      # FortiManager values are placeholders: the NVA deploys fine, the FortiGates
      # just will not register anywhere - acceptable for a deploy smoke test
      extra_tfvars: |
        managedidentity_id          = ""
        managed_resource_group_name = "fortiqa-vwan-${{ github.run_number }}-managed-rg"
        fortimanager_host           = "192.0.2.1"
        fortimanager_serial         = "FMG-VMTM00000000"
        tags = {
          environment = "fortiqa-ci"
          publisher   = "Fortinet"
        }
      deploy: ${{ inputs.deploy == true }} # only ever true on manual dispatch; push = plan only
      # the managed NVA is a Marketplace managed application, not a VM image
      marketplace_offer: fortigate_vwan_nva
      marketplace_sku: fortigate-managedvwan
      timeout_minutes: 180 # VWAN hub + NVA deploy and destroy are slow (module sets 120m azapi timeouts)
      # Hub NVA NSGs are Microsoft-locked and mgmt goes via FortiManager, so no SSH test.
      # Instead verify the deployment via the Azure control plane while it is up.
      post_test: |
        RG="${TF_VAR_prefix}-rg"
        MANAGED_RG="fortiqa-vwan-${{ github.run_number }}-managed-rg"
        echo "=== Virtual hub state ==="
        az network vhub show -g "$RG" -n "${TF_VAR_prefix}-virtualwan-hub" \
          --query "{provisioningState:provisioningState, routingState:routingState, addressPrefix:addressPrefix}" -o table
        echo "=== FortiGate managed NVA ==="
        az network virtual-appliance list -g "$MANAGED_RG" \
          --query "[].{name:name, provisioningState:provisioningState, asn:virtualApplianceAsn, version:nvaVersion}" -o table
        echo "=== NVA provisioning check ==="
        STATE=$(az network virtual-appliance list -g "$MANAGED_RG" --query "[0].provisioningState" -o tsv)
        echo "NVA provisioningState: $STATE"
        test "$STATE" = "Succeeded"
        echo "=== Managed application ==="
        az resource list -g "$RG" --resource-type Microsoft.Solutions/applications \
          --query "[].{name:name, state:properties.provisioningState}" -o table || true
        echo "Post-deploy checks OK"
    secrets: inherit
