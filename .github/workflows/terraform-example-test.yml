name: 'Terraform Test (reusable)'

# Reusable workflow that tests a single example in examples/<example>.
# Runs: init -> fmt check -> validate -> plan (no apply).
#
# Auth: Azure OIDC (federated) — no client secret. Requires a federated
# credential on the app registration whose subject matches the run
# (e.g. repo:OWNER/REPO:ref:refs/heads/main) plus the job permission
# id-token: write.
# Required repository secrets (used by all callers via `secrets: inherit`):
#   ARM_CLIENT_ID, ARM_SUBSCRIPTION_ID, ARM_TENANT_ID, PASSWORD

on:
  workflow_call:
    inputs:
      example:
        description: 'Directory name under examples/'
        required: true
        type: string
      prefix:
        description: 'Short resource prefix used during plan'
        required: true
        type: string
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'westeurope'
      extra_tfvars:
        description: 'Optional extra variables (HCL), written to ci.auto.tfvars'
        required: false
        type: string
        default: ''
      deploy:
        description: 'When true, apply the plan and destroy afterwards (real deployment). Default: plan only.'
        required: false
        type: boolean
        default: false
      marketplace_offer:
        description: 'Azure Marketplace offer to accept terms for before deploying (only used when deploy=true)'
        required: false
        type: string
        default: ''
      marketplace_sku:
        description: 'Azure Marketplace plan/SKU to accept terms for before deploying (only used when deploy=true)'
        required: false
        type: string
        default: ''
      ssh_test_output:
        description: 'Space-separated terraform output name(s) holding FortiGate mgmt public IP(s), each optionally suffixed :port (default 22). E.g. "FGT-A-MGMT-IP FGT-B-MGMT-IP" or "ELB-PIP:50030 ELB-PIP:50031". When set (and deploy=true), CI logs into each over SSH and runs status commands after apply.'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Job timeout in minutes. Increase for slow deployments like Virtual WAN.'
        required: false
        type: number
        default: 60
      post_test:
        description: 'Optional shell script run after a successful apply, while the infrastructure is up (and after the SSH test, if any). Runs in the example directory with az logged in and terraform available.'
        required: false
        type: string
        default: ''
      ha_test:
        description: 'When true (and the SSH test runs), assert each node is in HA mode via "get system ha status" (retried up to 3 min for the cluster to form). Fails the job if any node reports Standalone instead of "Mode: HA". Only set for HA examples (A/P, A/A).'
        required: false
        type: boolean
        default: false
      ci_override_path:
        description: 'Optional path (relative to repo root) of a Terraform *_override.tf file written before init. Used for CI-only fixes without modifying examples/ or modules/. Must end in _override.tf (gitignored).'
        required: false
        type: string
        default: ''
      ci_override_hcl:
        description: 'HCL content for ci_override_path.'
        required: false
        type: string
        default: ''

jobs:
  terraform:
    name: "Terraform ${{ inputs.example }}${{ inputs.deploy && ' (deploy)' || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      id-token: write # mint the GitHub OIDC token for Azure federated login
      contents: read
    env:
      TFPath: examples/${{ inputs.example }}
      TF_IN_AUTOMATION: 'true'
      TF_VAR_prefix: "${{ inputs.prefix }}-${{ github.run_number }}"
      TF_VAR_location: "${{ inputs.location }}"
      TF_VAR_username: "azureuser"
      TF_VAR_password: "${{ secrets.PASSWORD }}"
      TF_VAR_subscription_id: "${{ secrets.ARM_SUBSCRIPTION_ID }}"
      # OIDC (federated) auth — no client secret. The azurerm provider picks up
      # the GitHub OIDC token automatically when ARM_USE_OIDC=true.
      ARM_USE_OIDC: 'true'
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false # wrapper breaks $(terraform output) command substitution

      - name: "Write extra tfvars"
        if: inputs.extra_tfvars != ''
        run: printf '%s\n' "${EXTRA_TFVARS}" > ci.auto.tfvars
        env:
          EXTRA_TFVARS: ${{ inputs.extra_tfvars }}
        working-directory: ${{ env.TFPath }}

      # CI-only Terraform override (merged by Terraform at load time, never committed:
      # *_override.tf is gitignored). Exists for the whole job, so it applies to
      # plan, apply AND destroy.
      - name: "Write CI override file"
        if: inputs.ci_override_path != '' && inputs.ci_override_hcl != ''
        run: |
          printf '%s\n' "${CI_OVERRIDE}" > '${{ inputs.ci_override_path }}'
          echo "Wrote ${{ inputs.ci_override_path }}:"
          cat '${{ inputs.ci_override_path }}'
        env:
          CI_OVERRIDE: ${{ inputs.ci_override_hcl }}

      - name: "Terraform Init"
        id: init
        run: terraform init -input=false
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Format"
        id: format
        run: terraform fmt -check -diff -recursive
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Validate"
        id: validate
        run: terraform validate
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -input=false -out plan.tfplan
        working-directory: ${{ env.TFPath }}

      - name: "Plan Summary"
        run: terraform show -no-color plan.tfplan | tail -n 20
        working-directory: ${{ env.TFPath }}

      # ── Deployment steps below only run when deploy=true ────────────────────

      # OIDC login for the az CLI (Marketplace terms + post-deploy checks).
      # No client secret: uses the federated GitHub OIDC token.
      - name: "Azure Login (OIDC)"
        if: inputs.deploy
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Accept Marketplace Terms"
        if: inputs.deploy && inputs.marketplace_offer != '' && inputs.marketplace_sku != ''
        run: |
          az vm image terms accept \
            --publisher fortinet \
            --offer "${{ inputs.marketplace_offer }}" \
            --plan "${{ inputs.marketplace_sku }}" \
            --output none
          echo "Marketplace terms accepted for ${{ inputs.marketplace_offer }} / ${{ inputs.marketplace_sku }}"

      - name: "Terraform Apply"
        id: apply
        if: inputs.deploy
        run: terraform apply -input=false -auto-approve plan.tfplan
        working-directory: ${{ env.TFPath }}

      - name: "Test - SSH login to FortiGate"
        if: inputs.deploy && inputs.ssh_test_output != '' && steps.apply.outcome == 'success'
        working-directory: ${{ env.TFPath }}
        run: |
          # Mirror everything below to a report file as well as the console, so it
          # can be uploaded as an artifact (captures output even when the step fails).
          REPORT="$RUNNER_TEMP/fgt-test-report-${{ inputs.example }}.txt"
          exec > >(tee -a "$REPORT") 2>&1
          echo "FortiGate verification report - example=${{ inputs.example }} run=${{ github.run_number }} ($(date -u +%FT%TZ))"
          sudo apt-get -qq update >/dev/null && sudo apt-get -qq install -y sshpass >/dev/null
          FAIL=0
          for SPEC in ${{ inputs.ssh_test_output }}; do
            OUT="${SPEC%%:*}"
            PORT="${SPEC#*:}"
            [ "$PORT" = "$SPEC" ] && PORT=22
            IP=$(terraform output -raw "$OUT")
            echo "=== Testing $OUT -> $IP port $PORT ==="
            SSH="sshpass -e ssh -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 $TF_VAR_username@$IP"
            OK=0
            # FortiGate needs a few minutes to boot after the VM is created: retry up to 10 minutes
            for i in $(seq 1 20); do
              if $SSH "get system status" >/dev/null 2>&1; then
                # Disable the CLI pager so output isn't chopped up by "--More--"
                # (this is a persistent console setting on the device).
                printf 'config system console\nset output standard\nend\n' | $SSH >/dev/null 2>&1 || true

                # Run each check, print it under its own header (leading newline
                # so it isn't glued to the FortiGate prompt), and fail the job if
                # FortiOS reports a "Command fail".
                for CMD in "get system status" "show system interface" "show router static" "diag debug cloudinit show"; do
                  printf '\n===== %s =====\n' "$CMD"
                  CMD_OUT=$($SSH "$CMD" 2>&1) || true
                  printf '%s\n' "$CMD_OUT"
                  if printf '%s' "$CMD_OUT" | grep -qi 'command fail'; then
                    echo "::error::$OUT ($IP): '$CMD' returned a Command fail"
                    FAIL=1
                  fi
                done

                if [ "${{ inputs.ha_test }}" = "true" ]; then
                  printf '\n===== get system ha status =====\n'
                  # HA may still be negotiating right after boot: retry up to 3 minutes
                  HA_OK=0
                  for h in $(seq 1 6); do
                    HA_OUT=$($SSH "get system ha status" 2>/dev/null || true)
                    printf '%s\n' "$HA_OUT"
                    # A configured cluster reports "Mode: HA A-P" / "Mode: HA A-A";
                    # a standalone unit reports "Mode: Standalone".
                    if echo "$HA_OUT" | grep -qiE "Mode:[[:space:]]*HA"; then
                      echo "HA is configured on $OUT"
                      HA_OK=1
                      break
                    fi
                    echo "HA not formed yet on $OUT (attempt $h/6), retrying in 30s..."
                    sleep 30
                  done
                  if [ "$HA_OK" -ne 1 ]; then
                    echo "::error::$OUT ($IP) is not in HA mode (get system ha status did not report 'Mode: HA')"
                    FAIL=1
                  fi
                fi
                echo "SSH test OK for $OUT after $i attempt(s)"
                OK=1
                break
              fi
              echo "$OUT not reachable yet (attempt $i/20), retrying in 30s..."
              sleep 30
            done
            if [ "$OK" -ne 1 ]; then
              echo "::error::$OUT ($IP) did not become reachable over SSH within 10 minutes"
              FAIL=1
            fi
          done
          exit $FAIL
        env:
          SSHPASS: ${{ secrets.PASSWORD }}

      - name: "Upload FortiGate test report"
        # Runs even if the SSH test failed, so the captured output is always available.
        if: always() && inputs.deploy && inputs.ssh_test_output != '' && steps.apply.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: fgt-test-report-${{ inputs.example }}
          path: ${{ runner.temp }}/fgt-test-report-${{ inputs.example }}.txt
          if-no-files-found: warn

      - name: "Test - post-deploy checks"
        if: inputs.deploy && inputs.post_test != '' && steps.apply.outcome == 'success'
        working-directory: ${{ env.TFPath }}
        run: |
          # Already logged in via the "Azure Login (OIDC)" step above.
          ${{ inputs.post_test }}

      # Destroy always runs after an apply attempt (success OR failure),
      # so partially created resources are cleaned up and nothing keeps billing.
      - name: "Terraform Destroy"
        if: always() && inputs.deploy && contains(fromJSON('["success", "failure"]'), steps.apply.outcome)
        run: terraform destroy -input=false -auto-approve
        working-directory: ${{ env.TFPath }}
