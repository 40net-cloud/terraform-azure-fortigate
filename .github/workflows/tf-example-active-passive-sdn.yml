name: '[FGT] TF - Example - Active-Passive-SDN'

on:
  push:
    branches:
      - main
    paths:
      - 'examples/active-passive-sdn/**'
      - 'modules/active-passive-sdn/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-active-passive-sdn.yml'
  pull_request:
    paths:
      - 'examples/active-passive-sdn/**'
      - 'modules/active-passive-sdn/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-active-passive-sdn.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy the FortiGate HA pair (apply + destroy). Off = plan only.'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/terraform-example-test.yml
    with:
      example: active-passive-sdn
      prefix: fortiqa-apsdn # lowercase: prefix is used in domain_name_label
      deploy: ${{ inputs.deploy == true }} # only ever true on manual dispatch; push = plan only
      marketplace_offer: fortinet_fortigate-vm
      marketplace_sku: fortinet_fg-vm_byol_76
      ssh_test_output: FGT-A-MGMT-IP FGT-B-MGMT-IP # test both HA members
    secrets: inherit
