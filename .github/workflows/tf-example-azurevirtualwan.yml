name: '[FGT] TF - Example - AzureVirtualWAN'

on:
  push:
    branches:
      - main
    paths:
      - 'examples/azurevirtualwan/**'
      - 'modules/azurevirtualwan/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-azurevirtualwan.yml'
  pull_request:
    paths:
      - 'examples/azurevirtualwan/**'
      - 'modules/azurevirtualwan/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-azurevirtualwan.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy the VWAN hub + FortiGate managed NVA (apply + destroy). Slow: 1-2 hours. Off = plan only.'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/terraform-example-test.yml
    with:
      example: azurevirtualwan
      prefix: fortiqa-vwan # lowercase: prefix may be used in DNS labels
      # managedidentity_id = "": the module creates + authorizes a managed identity itself
      # managed RG must NOT pre-exist -> unique name per run
      # FortiManager values are placeholders: the NVA deploys fine, the FortiGates
      # just will not register anywhere - acceptable for a deploy smoke test
      extra_tfvars: |
        managedidentity_id          = ""
        managed_resource_group_name = "fortiqa-vwan-${{ github.run_number }}-managed-rg"
        fortimanager_host           = "192.0.2.1"
        fortimanager_serial         = "FMG-VMTM00000000"
        tags = {
          environment = "fortiqa-ci"
          publisher   = "Fortinet"
        }
      deploy: ${{ inputs.deploy == true }} # only ever true on manual dispatch; push = plan only
      # the managed NVA is a Marketplace managed application, not a VM image
      marketplace_offer: fortigate_vwan_nva
      marketplace_sku: fortigate-managedvwan
      timeout_minutes: 180 # VWAN hub + NVA deploy and destroy are slow
    secrets: inherit
