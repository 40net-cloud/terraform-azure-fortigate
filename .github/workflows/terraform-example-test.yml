name: 'Terraform Example Test (reusable)'

# Reusable workflow that tests a single example in examples/<example>.
# Runs: init -> fmt check -> validate -> plan (no apply).
#
# Required repository secrets (used by all callers via `secrets: inherit`):
#   ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_SUBSCRIPTION_ID, ARM_TENANT_ID, PASSWORD

on:
  workflow_call:
    inputs:
      example:
        description: 'Directory name under examples/'
        required: true
        type: string
      prefix:
        description: 'Short resource prefix used during plan'
        required: true
        type: string
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'westeurope'
      extra_tfvars:
        description: 'Optional extra variables (HCL), written to ci.auto.tfvars'
        required: false
        type: string
        default: ''
      deploy:
        description: 'When true, apply the plan and destroy afterwards (real deployment). Default: plan only.'
        required: false
        type: boolean
        default: false
      marketplace_offer:
        description: 'Azure Marketplace offer to accept terms for before deploying (only used when deploy=true)'
        required: false
        type: string
        default: ''
      marketplace_sku:
        description: 'Azure Marketplace plan/SKU to accept terms for before deploying (only used when deploy=true)'
        required: false
        type: string
        default: ''
      ssh_test_output:
        description: 'Space-separated terraform output name(s) holding FortiGate mgmt public IP(s). When set (and deploy=true), CI logs into each over SSH and runs status commands after apply.'
        required: false
        type: string
        default: ''

jobs:
  terraform:
    name: "Terraform ${{ inputs.example }}${{ inputs.deploy && ' (deploy)' || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TFPath: examples/${{ inputs.example }}
      TF_IN_AUTOMATION: 'true'
      TF_VAR_prefix: "${{ inputs.prefix }}-${{ github.run_number }}"
      TF_VAR_location: "${{ inputs.location }}"
      TF_VAR_username: "azureuser"
      TF_VAR_password: "${{ secrets.PASSWORD }}"
      TF_VAR_subscription_id: "${{ secrets.ARM_SUBSCRIPTION_ID }}"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # wrapper breaks $(terraform output) command substitution

      - name: "Write extra tfvars"
        if: inputs.extra_tfvars != ''
        run: printf '%s\n' "${EXTRA_TFVARS}" > ci.auto.tfvars
        env:
          EXTRA_TFVARS: ${{ inputs.extra_tfvars }}
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Init"
        id: init
        run: terraform init -input=false
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Format"
        id: format
        run: terraform fmt -check -diff -recursive
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Validate"
        id: validate
        run: terraform validate
        working-directory: ${{ env.TFPath }}

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -input=false -out plan.tfplan
        working-directory: ${{ env.TFPath }}

      - name: "Plan Summary"
        run: terraform show -no-color plan.tfplan | tail -n 20
        working-directory: ${{ env.TFPath }}

      # ── Deployment steps below only run when deploy=true ────────────────────

      - name: "Accept Marketplace Terms"
        if: inputs.deploy && inputs.marketplace_offer != '' && inputs.marketplace_sku != ''
        run: |
          az login --service-principal -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"
          az vm image terms accept \
            --publisher fortinet \
            --offer "${{ inputs.marketplace_offer }}" \
            --plan "${{ inputs.marketplace_sku }}" \
            --output none
          echo "Marketplace terms accepted for ${{ inputs.marketplace_offer }} / ${{ inputs.marketplace_sku }}"

      - name: "Terraform Apply"
        id: apply
        if: inputs.deploy
        run: terraform apply -input=false -auto-approve plan.tfplan
        working-directory: ${{ env.TFPath }}

      - name: "Test - SSH login to FortiGate"
        if: inputs.deploy && inputs.ssh_test_output != '' && steps.apply.outcome == 'success'
        working-directory: ${{ env.TFPath }}
        run: |
          sudo apt-get -qq update >/dev/null && sudo apt-get -qq install -y sshpass >/dev/null
          FAIL=0
          for OUT in ${{ inputs.ssh_test_output }}; do
            IP=$(terraform output -raw "$OUT")
            echo "=== Testing $OUT -> $IP ==="
            SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 $TF_VAR_username@$IP"
            OK=0
            # FortiGate needs a few minutes to boot after the VM is created: retry up to 10 minutes
            for i in $(seq 1 20); do
              if $SSH "get system status"; then
                echo "--- interfaces ---"
                $SSH "show system interface" || true
                echo "SSH test OK for $OUT after $i attempt(s)"
                OK=1
                break
              fi
              echo "$OUT not reachable yet (attempt $i/20), retrying in 30s..."
              sleep 30
            done
            if [ "$OK" -ne 1 ]; then
              echo "::error::$OUT ($IP) did not become reachable over SSH within 10 minutes"
              FAIL=1
            fi
          done
          exit $FAIL
        env:
          SSHPASS: ${{ secrets.PASSWORD }}

      # Destroy always runs after an apply attempt (success OR failure),
      # so partially created resources are cleaned up and nothing keeps billing.
      - name: "Terraform Destroy"
        if: always() && inputs.deploy && contains(fromJSON('["success", "failure"]'), steps.apply.outcome)
        run: terraform destroy -input=false -auto-approve
        working-directory: ${{ env.TFPath }}
