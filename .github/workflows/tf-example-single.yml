name: '[FGT] TF - Example - Single'

on:
  push:
    branches:
      - main
    paths:
      - 'examples/single/**'
      - 'modules/single/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-single.yml'
  pull_request:
    paths:
      - 'examples/single/**'
      - 'modules/single/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-single.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy the FortiGate (apply + destroy). Off = plan only.'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/terraform-example-test.yml
    with:
      example: single
      prefix: fortiqa-sgl # lowercase: prefix may be used in DNS labels
      deploy: ${{ inputs.deploy == true }} # only ever true on manual dispatch; push = plan only
      marketplace_offer: fortinet_fortigate-vm
      marketplace_sku: fortinet_fg-vm_byol_76
      ssh_test_output: FGT-MGMT-IP # after apply: SSH in and run status commands
    secrets: inherit
