name: '[FGT] TF - Example - Active-Active-ELB-ILB'

on:
  push:
    branches:
      - main
    paths:
      - 'examples/active-active-elb-ilb/**'
      - 'modules/active-active/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-active-active-elb-ilb.yml'
  pull_request:
    paths:
      - 'examples/active-active-elb-ilb/**'
      - 'modules/active-active/**'
      - '.github/workflows/terraform-example-test.yml'
      - '.github/workflows/tf-example-active-active-elb-ilb.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy the FortiGate A/A pair (apply + destroy). Off = plan only.'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel: a killed deploy run would skip its destroy/cleanup

jobs:
  test:
    permissions:
      id-token: write # required for Azure OIDC federated login
      contents: read
    uses: ./.github/workflows/terraform-example-test.yml
    with:
      example: active-active-elb-ilb
      prefix: fortiqa-aa # lowercase: prefix may be used in DNS labels
      # fgt_ssh_public_key_file has no default in this example; empty = password auth only
      extra_tfvars: |
        fgt_ssh_public_key_file = ""
      deploy: ${{ inputs.deploy == true }} # only ever true on manual dispatch; push = plan only
      marketplace_offer: fortinet_fortigate-vm
      marketplace_sku: fortinet_fg-vm_byol_76
      # mgmt access via ELB inbound NAT rules: SSH = 50030 + instance number
      ssh_test_output: ELB-PIP:50030 ELB-PIP:50031
      # No ha_test: active-active deploys standalone FortiGates with FGSP
      # session-sync (not an FGCP HA cluster), so "get system ha status"
      # correctly reports standalone. HA-mode assertion only fits A/P.
    secrets: inherit
